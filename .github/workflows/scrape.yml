name: Satta King Scraper

on:
  schedule:
    # Run 4 times a day (after each result is announced)
    # Desawar: 05:00 AM IST -> 23:30 UTC (previous day)
    - cron: '30 23 * * *'
    # Faridabad: 06:00 PM IST -> 12:30 UTC
    - cron: '30 12 * * *'
    # Ghaziabad: 09:25 PM IST -> 15:55 UTC
    - cron: '55 15 * * *'
    # Gali: 11:25 PM IST -> 17:55 UTC
    - cron: '55 17 * * *'
  workflow_dispatch: # Allow manual triggering

# REQUIRED: Gives the workflow permission to push updates back to GitHub
permissions:
  contents: write
    - name: 🚀 Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: sattaking786
        directory: public
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 📦 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Updated to Node 22 LTS (Node 20 is deprecated)
        
    - name: 📥 Install dependencies
      run: |
        cd scraper
        npm install --no-package-lock
        
    - name: 🚀 Run scraper
      run: |
        cd scraper
        node scraper.js
      env:
        NODE_ENV: production
        
    - name: 📊 Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/results.json data/historical/
        git commit -m "🤖 Auto-update results - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || exit 0
        git push
