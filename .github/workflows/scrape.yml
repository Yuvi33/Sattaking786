name: Satta King Scraper

on:
  schedule:
    # Run 4 times a day, 10 mins AFTER results to ensure target site has updated
    # Desawar: 05:00 AM IST -> 23:40 UTC (previous day)
    - cron: '40 23 * * *'
    # Faridabad: 06:00 PM IST -> 12:40 UTC
    - cron: '40 12 * * *'
    # Ghaziabad: 09:25 PM IST -> 16:05 UTC
    - cron: '5 16 * * *'
    # Gali: 11:25 PM IST -> 18:05 UTC
    - cron: '5 18 * * *'
  workflow_dispatch: # Allow manual triggering

# REQUIRED: Gives the workflow permission to push updates and create deployments
permissions:
  contents: write
  deployments: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 📦 Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: 📥 Install dependencies
      run: |
        cd scraper
        npm install --no-package-lock
        
    - name: 🚀 Run scraper
      run: |
        cd scraper
        node scraper.js
      env:
        NODE_ENV: production
        
    - name: 📊 Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/data/results.json public/data/historical/
        git commit -m "🤖 Auto-update results - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || exit 0
        git push

    - name: 🚀 Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: sattaking786
        directory: public
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
